name: Catch up the latest version

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cli
  cancel-in-progress: false

jobs:
  update-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Pushes made with GITHUB_TOKEN don't trigger other workflows, so the
      # cachix workflow won't run for the bot's commits. Push the build from
      # this job instead.
      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: sfdx-nix
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Get the latest version from the Salesforce CLI repo
        run: |
          latest_version=$(curl -sS --fail https://api.github.com/repos/salesforcecli/cli/releases/latest | jq -r .tag_name)

          if [ -z "$latest_version" ] || [ "$latest_version" = "null" ]; then
            echo "Failed to fetch latest version from salesforcecli repo"
            exit 1
          fi

          echo "version=$latest_version" >> $GITHUB_ENV

      - name: Get current version
        run: |
          current_version=$(jq -r .cliVersion versions.json)

          if [ -z "$current_version" ]; then
              echo "Failed to extract current version from versions.json"
              exit 1
          fi

          echo "Current version: $current_version"
          echo "Latest version: $version"

          if [ "$current_version" = "$version" ]; then
            echo "The latest version is the same as the current version ($current_version). No update needed."
            echo "update_needed=false" >> $GITHUB_ENV
          else
            echo "update_needed=true" >> $GITHUB_ENV
          fi

      - name: Fetch new hashes
        if: env.update_needed == 'true'
        run: |
          repo_code=$(nix-prefetch-url --unpack https://github.com/salesforcecli/cli/archive/refs/tags/$version.tar.gz)
          echo "Repo code: $repo_code"
          repo_hash=$(nix hash convert --hash-algo sha256 $repo_code)

          if [ -z "$repo_hash" ]; then
            echo "Repo hash calculation got empty value."
            exit 1
          fi

          echo "Repo hash: $repo_hash"

          temp_dir=$(mktemp -d)
          curl -sS -o "$temp_dir/yarn.lock" "https://raw.githubusercontent.com/salesforcecli/cli/$version/yarn.lock"

          yarn_code=$(nix run nixpkgs#prefetch-yarn-deps -- "$temp_dir/yarn.lock")
          echo "Yarn code: $yarn_code"
          yarn_hash=$(nix hash convert --hash-algo sha256 $yarn_code)

          if [ -z "$yarn_hash" ]; then
            echo "Yarn hash calculation got empty value."
            exit 1
          fi

          echo "Yarn hash: $yarn_hash"

          jq -n --arg cliVersion "$version" \
                --arg cliHash "$repo_hash" \
                --arg yarnHash "$yarn_hash" \
                '{cliVersion: $cliVersion, cliHash: $cliHash, yarnHash: $yarnHash}' > versions.json

      - name: Test result by installing
        if: env.update_needed == 'true'
        run: |
          nix build
          nix run . -- version

      - name: Commit to main
        if: env.update_needed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "Update Salesforce CLI to $version"
          git push origin main
